name: publish-federation-remote

on:
  workflow_dispatch:
    inputs:
      platform_version:
        description: Published platform package version to install from GitHub Packages.
        required: false
        type: string
      remote_version:
        description: Immutable remote version or tag. Defaults to sha-<short-sha>.
        required: false
        type: string
      dry_run:
        description: Validate build and publish plan without uploading.
        required: true
        default: true
        type: boolean
  push:
    branches:
      - main
    paths:
      - apps/sqlite/**
      - deploy/**
      - .github/workflows/publish-federation-remote.yml
      - package.json
      - pnpm-lock.yaml

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Checkout infra-tooling
        uses: actions/checkout@v6
        with:
          repository: go-go-golems/infra-tooling
          path: .infra-tooling

      - name: Checkout GitOps repo for dry-run validation
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        uses: actions/checkout@v6
        with:
          repository: wesen/2026-03-27--hetzner-k3s
          path: .gitops
          token: ${{ secrets.K3S_REPO_READ_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@go-go-golems'

      - name: Configure GitHub Packages auth
        run: |
          cat <<EOF > "$HOME/.npmrc"
          @go-go-golems:registry=https://npm.pkg.github.com
          //npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}
          EOF
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve platform version
        id: platform-version
        run: |
          platform_version="${{ inputs.platform_version }}"
          if [ -z "${platform_version}" ]; then
            platform_version="${{ vars.GO_GO_OS_PLATFORM_VERSION }}"
          fi
          if [ -z "${platform_version}" ]; then
            echo "Missing platform version. Set workflow input platform_version or repository variable GO_GO_OS_PLATFORM_VERSION." >&2
            exit 1
          fi
          echo "platform_version=${platform_version}" >> "$GITHUB_OUTPUT"

      - name: Rewrite platform deps to published versions
        run: |
          node <<'EOF'
          const fs = require('node:fs');
          const packagePath = 'apps/sqlite/package.json';
          const packageJson = JSON.parse(fs.readFileSync(packagePath, 'utf8'));
          const platformDeps = [
            '@go-go-golems/os-core',
            '@go-go-golems/os-shell',
            '@go-go-golems/os-scripting',
          ];

          for (const dep of platformDeps) {
            if (packageJson.dependencies?.[dep]) {
              packageJson.dependencies[dep] = process.env.PLATFORM_VERSION;
            }
          }

          fs.writeFileSync(packagePath, `${JSON.stringify(packageJson, null, 2)}\n`);
          EOF
        env:
          PLATFORM_VERSION: ${{ steps.platform-version.outputs.platform_version }}

      - name: Install dependencies
        run: npm install --package-lock=false
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build sqlite federation artifact
        run: npm run build:federation -w apps/sqlite

      - name: Upload built federation artifact
        uses: actions/upload-artifact@v4
        with:
          name: sqlite-dist-federation
          path: apps/sqlite/dist-federation

      - name: Ensure AWS CLI is available
        run: |
          if ! command -v aws >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y awscli
          fi
          aws --version

      - name: Resolve remote version
        id: version
        run: |
          remote_version="${{ inputs.remote_version }}"
          if [ -z "${remote_version}" ]; then
            remote_version="sha-${GITHUB_SHA::7}"
          fi
          echo "remote_version=${remote_version}" >> "$GITHUB_OUTPUT"

      - name: Fail if object storage publish configuration is missing
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.dry_run }}
        run: |
          missing=0
          for name in \
            HETZNER_OBJECT_STORAGE_ACCESS_KEY_ID \
            HETZNER_OBJECT_STORAGE_SECRET_ACCESS_KEY \
            HETZNER_OBJECT_STORAGE_BUCKET \
            HETZNER_OBJECT_STORAGE_ENDPOINT \
            HETZNER_OBJECT_STORAGE_REGION \
            SQLITE_FEDERATION_PUBLIC_BASE_URL
          do
            if [ -z "${!name}" ]; then
              echo "Missing required publish configuration: ${name}" >&2
              missing=1
            fi
          done
          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi
        env:
          HETZNER_OBJECT_STORAGE_ACCESS_KEY_ID: ${{ secrets.HETZNER_OBJECT_STORAGE_ACCESS_KEY_ID }}
          HETZNER_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.HETZNER_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          HETZNER_OBJECT_STORAGE_BUCKET: ${{ secrets.HETZNER_OBJECT_STORAGE_BUCKET }}
          HETZNER_OBJECT_STORAGE_ENDPOINT: ${{ secrets.HETZNER_OBJECT_STORAGE_ENDPOINT }}
          HETZNER_OBJECT_STORAGE_REGION: ${{ secrets.HETZNER_OBJECT_STORAGE_REGION }}
          SQLITE_FEDERATION_PUBLIC_BASE_URL: ${{ vars.SQLITE_FEDERATION_PUBLIC_BASE_URL }}

      - name: Publish federation artifact to object storage
        id: publish
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.HETZNER_OBJECT_STORAGE_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.HETZNER_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          HETZNER_OBJECT_STORAGE_BUCKET: ${{ secrets.HETZNER_OBJECT_STORAGE_BUCKET }}
          HETZNER_OBJECT_STORAGE_ENDPOINT: ${{ secrets.HETZNER_OBJECT_STORAGE_ENDPOINT }}
          HETZNER_OBJECT_STORAGE_REGION: ${{ secrets.HETZNER_OBJECT_STORAGE_REGION }}
          SQLITE_FEDERATION_PUBLIC_BASE_URL: ${{ vars.SQLITE_FEDERATION_PUBLIC_BASE_URL }}
        run: |
          args=()
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            args+=("--dry-run")
          fi

          python3 .infra-tooling/scripts/federation/publish_federation_remote.py \
            --source-dir apps/sqlite/dist-federation \
            --remote-id sqlite \
            --version "${{ steps.version.outputs.remote_version }}" \
            --bucket "${HETZNER_OBJECT_STORAGE_BUCKET:-example-bucket}" \
            --endpoint "${HETZNER_OBJECT_STORAGE_ENDPOINT:-https://example.invalid}" \
            --region "${HETZNER_OBJECT_STORAGE_REGION:-eu-central}" \
            --public-base-url "${SQLITE_FEDERATION_PUBLIC_BASE_URL:-https://assets.example.invalid}" \
            "${args[@]}"

      - name: Dry-run GitOps federation target update via infra-tooling
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: |
          python3 .infra-tooling/scripts/federation/open_federation_gitops_pr.py \
            --config deploy/federation-gitops-targets.json \
            --target wesen-os-sqlite-prod \
            --manifest-url "${{ steps.publish.outputs.manifest_url }}" \
            --gitops-repo-dir .gitops \
            --dry-run

      - name: Open GitOps PR via infra-tooling
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GITOPS_PR_TOKEN }}
        run: |
          python3 .infra-tooling/scripts/federation/open_federation_gitops_pr.py \
            --config deploy/federation-gitops-targets.json \
            --target wesen-os-sqlite-prod \
            --manifest-url "${{ steps.publish.outputs.manifest_url }}" \
            --push \
            --open-pr

      - name: Publish summary
        run: |
          remote_version="${{ steps.version.outputs.remote_version }}"
          manifest_url="${SQLITE_FEDERATION_PUBLIC_BASE_URL}/remotes/sqlite/versions/${remote_version}/mf-manifest.json"
          {
            echo "## SQLite Federation Publish"
            echo
            echo "- platform_version: \`${{ steps.platform-version.outputs.platform_version }}\`"
            echo "- remote_version: \`${remote_version}\`"
            echo "- manifest_url: \`${manifest_url}\`"
            echo "- dry_run: \`${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}\`"
            echo "- gitops_dry_run_target: \`wesen-os-sqlite-prod\`"
            echo "- gitops_pr_mode: \`${{ github.event_name != 'workflow_dispatch' || !inputs.dry_run }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          SQLITE_FEDERATION_PUBLIC_BASE_URL: ${{ vars.SQLITE_FEDERATION_PUBLIC_BASE_URL || 'https://assets.example.invalid' }}
